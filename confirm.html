<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirming Email - MySocial</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .center {
        max-width: 420px;
        margin: 80px auto;
        padding: 18px;
      }
      .card {
        background: #fff;
        padding: 18px;
        border-radius: 12px;
        border: 1px solid #eef2f7;
      }
      .spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid #e5e7eb;
        border-top: 3px solid #2b6cb0;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="center">
      <div class="card">
        <div style="text-align: center">
          <div class="spinner"></div>
          <p id="msg" style="margin-top: 16px; color: #666">Verifying your email...</p>
        </div>
      </div>
    </div>

    <script src="supabase-client.js"></script>
    <script>
      (async function () {
        const msgEl = document.getElementById('msg');
        
        console.log('🔍 DEBUG: Confirm.html loaded');
        console.log('URL:', window.location.href);
        console.log('URL Hash:', window.location.hash);
        console.log('URL Search:', window.location.search);

        try {
          // Wait for Supabase to load
          if (!window.SocialSupabase) {
            throw new Error('Supabase not loaded');
          }

          const client = SocialSupabase.getClient();
          
          console.log('🔍 DEBUG: Checking for session...');
          
          // Check if Supabase automatically created a session from the email link
          const { data: sessionData, error: sessionError } = await client.auth.getSession();
          
          console.log('Session data:', sessionData);
          console.log('Session error:', sessionError);
          console.log('Has session:', !!sessionData?.session);
          
          if (sessionData?.session) {
            console.log('✅ Session detected - signing out...');
            
            // Session was created - this means email verification succeeded
            // Now sign out to prevent auto-login
            msgEl.textContent = 'Email verified successfully! Signing out...';
            msgEl.style.color = '#059669';
            
            // IMPORTANT: Clear all auth state
            try {
              const signOutResult = await client.auth.signOut({ scope: 'global' });
              console.log('✅ Sign out result:', signOutResult);
              
              // Wait a moment for signOut to fully complete
              await new Promise(resolve => setTimeout(resolve, 1000));
              
              // Verify session is actually cleared
              const { data: sessionAfter } = await client.auth.getSession();
              console.log('🔍 Session after logout:', sessionAfter?.session ? '⚠️ STILL EXISTS!' : '✅ CLEARED');
              
            } catch (signOutError) {
              console.warn('⚠️ Signout failed:', signOutError);
            }

            // Redirect to login with success flag
            console.log('📍 Redirecting to login.html?verified=true');
            msgEl.textContent = 'Redirecting to login...';
            
            // Final delay to ensure all cleanup is done
            await new Promise(resolve => setTimeout(resolve, 500));
            
            window.location.href = 'login.html?verified=true';
          } else {
            console.log('❌ No session created - verification might have failed');
            
            // No session created - verification might have failed
            msgEl.textContent = 'Email verification failed. The link may be expired.';
            msgEl.style.color = '#c0262e';
            
            setTimeout(() => {
              window.location.href = 'login.html?verified=false';
            }, 3000);
          }
        } catch (err) {
          console.error('❌ Error:', err);
          msgEl.textContent = 'An error occurred. Please try again.';
          msgEl.style.color = '#c0262e';
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 3000);
        }
      })();
    </script>
  </body>
</html>
