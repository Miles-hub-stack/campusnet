<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - MySocial</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .center {
        max-width: 420px;
        margin: 80px auto;
        padding: 18px;
      }
      .card {
        background: #fff;
        padding: 18px;
        border-radius: 12px;
        border: 1px solid #eef2f7;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 12px;
      }
      .btn {
        padding: 10px 12px;
        border-radius: 8px;
        border: 0;
        background: #2b6cb0;
        color: #fff;
        cursor: pointer;
      }
      .link {
        margin-top: 8px;
        color: #2b6cb0;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="center">
      <div class="card">
        <h2 style="margin-bottom: 10px">Sign in</h2>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            placeholder="Choose a password"
          />
        </div>
        <div
          id="loginMsg"
          style="color: #c0262e; margin-top: 8px; font-size: 0.95rem"
        ></div>
        <button id="loginBtn" class="btn">Login</button>
        <div
          style="
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            align-items: center;
          "
        >
          <a href="register.html" style="color: #2b6cb0; text-decoration: none"
            >Register</a
          >
          <a href="support.html" style="color: #2b6cb0; text-decoration: none"
            >Support</a
          >
        </div>
        <div class="link" style="margin-top: 8px">
          This demo stores a simple user in localStorage.
        </div>
      </div>
    </div>

    <script src="supabase-client.js"></script>
    <script>
      // If already logged in locally or via Supabase, go to index
      (async function () {
        try {
          if (localStorage.getItem("user")) {
            window.location.href = "index.html";
            return;
          }
          // check supabase session
          if (window.SocialSupabase) {
            const { data } = await SocialSupabase.getUser();
            const user = data?.user;
            if (user) {
              window.location.href = "index.html";
            }
          }
        } catch (e) {}
      })();

      const loginBtn = document.getElementById("loginBtn");
      const emailEl = document.getElementById("email");
      const passwordEl = document.getElementById("password");
      const loginMsg = document.getElementById("loginMsg");

      loginBtn.addEventListener("click", async () => {
        const email = emailEl.value.trim();
        const password = passwordEl.value;
        loginMsg.textContent = "";
        if (!email || !password) {
          loginMsg.textContent = "Enter email and password";
          return;
        }
        try {
          const resp = await SocialSupabase.login(email, password);
          if (resp.error) {
            loginMsg.textContent = resp.error.message || String(resp.error);
            return;
          }
          // fetch user info and set local session (for compatibility with demo UI)
          const u = await SocialSupabase.getUser();
          const supUser = u.data?.user;
          const username =
            supUser?.user_metadata?.username ||
            (supUser?.email ? supUser.email.split("@")[0] : null);
          if (username) localStorage.setItem("user", username);
          window.location.href = "index.html";
        } catch (e) {
          loginMsg.textContent = "Login failed";
          console.error(e);
        }
      });

      [emailEl, passwordEl].forEach((el) =>
        el.addEventListener("keydown", (e) => {
          if (e.key === "Enter") loginBtn.click();
        }),
      );
    </script>
  </body>
</html>
