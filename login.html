<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - MySocial</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .center {
        max-width: 420px;
        margin: 80px auto;
        padding: 18px;
      }
      .card {
        background: #fff;
        padding: 18px;
        border-radius: 12px;
        border: 1px solid #eef2f7;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 12px;
      }
      .btn {
        padding: 10px 12px;
        border-radius: 8px;
        border: 0;
        background: #2b6cb0;
        color: #fff;
        cursor: pointer;
      }
      .link {
        margin-top: 8px;
        color: #2b6cb0;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="center">
      <div class="card">
        <h2 style="margin-bottom: 10px">Sign in</h2>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            placeholder="Choose a password"
          />
        </div>
        <div class="field">
          <a href="#" id="forgotLink" style="color: #2b6cb0; text-decoration: none">Forgot password?</a>
        </div>
        <div
          id="loginMsg"
          style="margin-top: 8px; font-size: 0.95rem"
        ></div>
        <button id="loginBtn" class="btn">Login</button>
        <div
          style="
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            align-items: center;
          "
        >
          <a href="register.html" style="color: #2b6cb0; text-decoration: none"
            >Register</a
          >
          <a href="support.html" style="color: #2b6cb0; text-decoration: none"
            >Support</a
          >
        </div>
      </div>
    </div>

    <script src="supabase-client.js"></script>
    <script>
      // Check for email confirmation parameters first
      const urlParams = new URLSearchParams(window.location.search);
      const hasAccessToken = urlParams.has('access_token');
      const hasError = urlParams.has('error');
      const isEmailConfirmation = hasAccessToken || hasError;

      // If already logged in via Supabase, go to index
      // BUT: Skip this if we're handling email confirmation
      (async function () {
        try {
          // Don't redirect if handling email confirmation
          if (isEmailConfirmation) {
            return;
          }

          // Check Supabase session
          if (window.SocialSupabase) {
            const { data } = await SocialSupabase.getUser();
            const user = data?.user;
            if (user) {
              window.location.href = "index.html";
            }
          }
        } catch (e) {}
      })();

      // Handle email confirmation redirect
      (function handleConfirmation() {
        if (!isEmailConfirmation) {
          return;
        }

        const accessToken = urlParams.get('access_token');
        const error = urlParams.get('error');
        const errorDescription = urlParams.get('error_description');

        const loginMsg = document.getElementById("loginMsg");

        // If there's an access_token, verification succeeded - sign out and show message
        if (accessToken) {
          (async () => {
            try {
              // Sign out to clear the auto-created session from email confirmation
              if (window.SocialSupabase) {
                await SocialSupabase.logout();
              }
            } catch (e) {
              console.warn("Logout failed:", e);
            }
            
            loginMsg.style.color = '#059669'; // green
            loginMsg.textContent = "Your email has been successfully verified. Please log in.";
            // Clear URL params to prevent confusion
            window.history.replaceState({}, document.title, window.location.pathname);
          })();
        } 
        // If there's an error, show error message
        else if (error) {
          loginMsg.style.color = '#c0262e'; // red
          let errorMsg = "Verification failed.";
          
          if (error === 'access_denied') {
            errorMsg = "Email verification link is invalid or expired. Please register again.";
          } else if (errorDescription) {
            errorMsg = decodeURIComponent(errorDescription);
          } else {
            errorMsg = error;
          }
          
          loginMsg.textContent = errorMsg;
          // Clear URL params
          window.history.replaceState({}, document.title, window.location.pathname);
        }
      })();

      const loginBtn = document.getElementById("loginBtn");
      const emailEl = document.getElementById("email");
      const passwordEl = document.getElementById("password");
      const loginMsg = document.getElementById("loginMsg");

      loginBtn.addEventListener("click", async () => {
        const email = emailEl.value.trim();
        const password = passwordEl.value;
        loginMsg.textContent = "";
        if (!email || !password) {
          loginMsg.textContent = "Enter email and password";
          return;
        }
        try {
          const resp = await SocialSupabase.login(email, password);
          if (resp.error) {
            loginMsg.textContent = resp.error.message || String(resp.error);
            return;
          }
          // Authenticated - go to feed
          window.location.href = "index.html";
        } catch (e) {
          loginMsg.textContent = "Login failed";
          console.error(e);
        }
      });

      // Forgot password handler — uses Supabase auth to send reset email
      const forgotLink = document.getElementById("forgotLink");
      if (forgotLink) {
        forgotLink.addEventListener("click", async (ev) => {
          ev.preventDefault();
          const email = emailEl.value.trim();
          if (!email) {
            loginMsg.textContent = "Enter your email to receive a reset link";
            emailEl.focus();
            return;
          }
          try {
            const client = SocialSupabase.getClient();
            const { data, error } = await client.auth.resetPasswordForEmail(email, {
              redirectTo: window.location.origin + "/login.html",
            });
            if (error) {
              loginMsg.textContent = error.message || String(error);
            } else {
              loginMsg.textContent = "Password reset email sent. Check your inbox.";
            }
          } catch (err) {
            console.error(err);
            loginMsg.textContent = "Unable to send reset email";
          }
        });
      }

      [emailEl, passwordEl].forEach((el) =>
        el.addEventListener("keydown", (e) => {
          if (e.key === "Enter") loginBtn.click();
        }),
      );
    </script>
  </body>
</html>
