<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register - MySocial</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .center {
        max-width: 480px;
        margin: 60px auto;
        padding: 18px;
      }
      .card {
        background: #fff;
        padding: 18px;
        border-radius: 12px;
        border: 1px solid #eef2f7;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 12px;
      }
      .btn {
        padding: 10px 12px;
        border-radius: 8px;
        border: 0;
        background: #2b6cb0;
        color: #fff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="center">
      <div class="card">
        <h2 style="margin-bottom: 8px">Create account</h2>
        <div class="field">
          <label>Name</label
          ><input id="name" type="text" placeholder="Full name" />
        </div>
        <div class="field">
          <label>Email</label
          ><input id="email" type="email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label>Password</label
          ><input
            id="password"
            type="password"
            placeholder="Choose a password"
          />
        </div>
        <div class="field">
          <label>Username</label
          ><input id="username" type="text" placeholder="username (unique)" />
        </div>
        <div class="field">
          <label>Avatar</label
          ><input id="avatarFile" type="file" accept="image/*" />
          <div id="avatarPreview" style="margin-top: 8px"></div>
        </div>
        <div class="field">
          <label>Bio</label
          ><textarea id="bio" rows="3" placeholder="A short bio"></textarea>
        </div>
        <button id="registerBtn" class="btn">Register</button>
        <div style="margin-top: 8px; font-size: 0.9rem; color: #718096">
          Accounts are stored locally for demo purposes.
        </div>
        <div id="registerMsg" style="margin-top: 10px"></div>
      </div>
    </div>

    <script src="supabase-client.js"></script>
    <script>
      const avatarFile = document.getElementById("avatarFile");
      const avatarPreview = document.getElementById("avatarPreview");

      avatarFile.addEventListener("change", (e) => {
        const f = e.target.files && e.target.files[0];
        if (!f) {
          avatarFile._dataUrl = null;
          avatarPreview.innerHTML = "";
          return;
        }
        const r = new FileReader();
        r.onload = (ev) => {
          avatarFile._dataUrl = ev.target.result;
          avatarPreview.innerHTML = `<img src="${ev.target.result}" style="max-width:120px;border-radius:8px">`;
        };
        r.readAsDataURL(f);
      });

      document
        .getElementById("registerBtn")
        .addEventListener("click", async () => {
          const name = document.getElementById("name").value.trim();
          const username = document.getElementById("username").value.trim();
          const bio = document.getElementById("bio").value.trim();
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;
          if (!username) return alert("Choose a username");
          if (!email || !password) return alert("Enter email and password");
          try {
            // simple local-username check to avoid duplicates in demo profiles map
            const profiles = JSON.parse(
              localStorage.getItem("profiles") || "{}",
            );
            if (profiles[username]) return alert("Username taken");
            const avatarData =
              avatarFile && avatarFile._dataUrl
                ? avatarFile._dataUrl
                : "https://via.placeholder.com/48";
            const profile = { name: name || username, avatar: avatarData, bio };

            // register with Supabase and create profile row
            const resp = await SocialSupabase.register(
              email,
              password,
              username,
              { name: profile.name, avatar: profile.avatar, bio: profile.bio },
            );
            if (resp.error) {
              console.error(resp.error);
              return alert(
                "Registration failed: " + (resp.error.message || resp.error),
              );
            }

            // keep local demo compatibility: save profiles map and users list locally too
            try {
              localStorage.setItem(
                "profile:" + username,
                JSON.stringify(profile),
              );
              profiles[username] = profile;
              localStorage.setItem("profiles", JSON.stringify(profiles));
              const users = JSON.parse(localStorage.getItem("users") || "[]");
              if (!users.includes(username)) {
                users.push(username);
                localStorage.setItem("users", JSON.stringify(users));
              }
            } catch (e) {
              console.warn("local profile save failed", e);
            }

            // Do not auto-login: show message instructing user to check their email for confirmation
            const msgDiv = document.getElementById("registerMsg");
            msgDiv.innerHTML = `<div style="padding:12px;background:#f0f9ff;border:1px solid #b6e0fe;border-radius:8px;color:#023047">Registration successful. Check your email (<strong>${email}</strong>) for a confirmation link. After confirming your email, return to <a href="login.html">Sign in</a>.</div>`;
          } catch (e) {
            console.error(e);
            alert("Unable to register");
          }
        });
    </script>
  </body>
</html>
