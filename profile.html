<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile - MySocial</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .center {
        max-width: 720px;
        margin: 40px auto;
        padding: 18px;
      }
      .card {
        background: #fff;
        padding: 18px;
        border-radius: 12px;
        border: 1px solid #eef2f7;
      }
      .row {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .avatar-large {
        width: 96px;
        height: 96px;
        border-radius: 12px;
      }
      .btn {
        padding: 8px 10px;
        border-radius: 8px;
        border: 0;
        background: #2b6cb0;
        color: #fff;
        cursor: pointer;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div class="center">
      <div class="card">
        <div class="row">
          <img
            id="avatar"
            class="avatar-large"
            src="https://via.placeholder.com/96"
            alt="avatar"
          />
          <div>
            <h2 id="displayName">User</h2>
            <div id="userHandle" style="color: #718096">@username</div>
          </div>
        </div>

        <div class="field">
          <label>Bio</label>
          <textarea id="bio" rows="3"></textarea>
        </div>
        <div class="field">
          <label>Avatar</label>
          <input id="avatarFile" type="file" accept="image/*" />
          <div id="avatarPreview" style="margin-top: 8px"></div>
        </div>
        <div style="display: flex; gap: 8px; margin-top: 10px">
          <button id="saveProfile" class="btn">Save</button>
          <button
            id="deleteAccount"
            class="btn"
            style="background: #fff; color: #c0262e; border: 1px solid #fee2e2"
          >
            Delete Account
          </button>
          <a href="index.html" style="align-self: center">Back</a>
        </div>
      </div>
    </div>

    <script src="supabase-client.js"></script>
    <script>
      (async function () {
        const localUser = localStorage.getItem("user");
        // if no session locally, try supabase
        let username = localUser;
        let supUser = null;
        if (window.SocialSupabase) {
          try {
            const u = await SocialSupabase.getUser();
            supUser = u.data?.user;
          } catch (e) {}
          if (supUser) {
            username =
              supUser.user_metadata?.username ||
              (supUser.email ? supUser.email.split("@")[0] : username);
          }
        }
        if (!username) return (window.location.href = "login.html");

        const avatarEl = document.getElementById("avatar");
        const displayNameEl = document.getElementById("displayName");
        const userHandleEl = document.getElementById("userHandle");
        const bioEl = document.getElementById("bio");
        const avatarFile = document.getElementById("avatarFile");
        const avatarPreview = document.getElementById("avatarPreview");

        // Load profile: prefer server profile when possible
        let profile = {
          name: username,
          avatar_url: "https://via.placeholder.com/96",
          bio: "",
        };
        if (window.SocialSupabase && username) {
          try {
            const u = await SocialSupabase.getUser();
            const userId = u.data?.user?.id;
            
            if (userId) {
              // Fetch profile by user ID (more reliable than username)
              const resp = await SocialSupabase.getProfileById(userId);
              if (!resp.error && resp.data) {
                profile = {
                  name: resp.data.name || username,
                  avatar_url: resp.data.avatar_url || profile.avatar_url,
                  bio: resp.data.bio || "",
                  id: resp.data.id,
                };
              }
            }
          } catch (e) {
            console.warn("Profile fetch failed", e);
          }
        }
        // fallback to localStorage if server profile not available
        try {
          const p = localStorage.getItem("profile:" + username);
          if (p) {
            const lp = JSON.parse(p);
            profile = Object.assign(profile, lp);
          }
        } catch (e) {}

        displayNameEl.textContent = profile.name || username;
        userHandleEl.textContent = "@" + username;
        avatarEl.src = profile.avatar_url || "https://via.placeholder.com/96";
        bioEl.value = profile.bio || "";
        avatarPreview.innerHTML = profile.avatar_url ? `<img src="${profile.avatar_url}" style="max-width:120px;border-radius:8px">` : "";

        avatarFile.addEventListener("change", (e) => {
          const f = e.target.files && e.target.files[0];
          if (!f) {
            avatarFile._dataUrl = null;
            avatarPreview.innerHTML = "";
            return;
          }
          const r = new FileReader();
          r.onload = (ev) => {
            avatarFile._dataUrl = ev.target.result;
            avatarPreview.innerHTML = `<img src="${ev.target.result}" style="max-width:120px;border-radius:8px">`;
          };
          r.readAsDataURL(f);
        });

        document
          .getElementById("saveProfile")
          .addEventListener("click", async () => {
            const bio = bioEl.value.trim();
            const avatar_url =
              avatarFile && avatarFile._dataUrl
                ? avatarFile._dataUrl
                : profile.avatar_url || "https://via.placeholder.com/96";
            const updated = {
              username: username,
              name: profile.name || username,
              avatar_url,
              bio,
            };
            // attempt server update
            if (window.SocialSupabase) {
              try {
                const res = await SocialSupabase.updateProfile(
                  Object.assign({}, updated, { id: profile.id || null }),
                );
                if (res.error) {
                  throw res.error;
                }
              } catch (e) {
                console.warn("Server profile update failed", e);
              }
            }
            // save locally for demo compatibility
            try {
              localStorage.setItem(
                "profile:" + username,
                JSON.stringify({
                  name: updated.name,
                  avatar_url: updated.avatar_url,
                  bio: updated.bio,
                }),
              );
              const profiles = JSON.parse(
                localStorage.getItem("profiles") || "{}",
              );
              profiles[username] = {
                name: updated.name,
                avatar_url: updated.avatar_url,
                bio: updated.bio,
              };
              localStorage.setItem("profiles", JSON.stringify(profiles));
            } catch (e) {
              console.warn("local save failed", e);
            }
            alert("Profile saved");
            window.location.href = "index.html";
          });

        document
          .getElementById("deleteAccount")
          .addEventListener("click", async () => {
            if (
              !confirm(
                "Delete your account and all associated data? This cannot be undone.",
              )
            )
              return;
            try {
              // attempt to delete server profile row
              if (window.SocialSupabase && profile.id) {
                try {
                  await SocialSupabase.deleteProfileById(profile.id);
                } catch (e) {
                  console.warn("Server profile delete failed", e);
                }
              }
              // local cleanup (same as before)
              localStorage.removeItem("profile:" + username);
              const profiles = JSON.parse(
                localStorage.getItem("profiles") || "{}",
              );
              if (profiles[username]) {
                delete profiles[username];
                localStorage.setItem("profiles", JSON.stringify(profiles));
              }
              const users = JSON.parse(localStorage.getItem("users") || "[]");
              const ui = users.indexOf(username);
              if (ui > -1) {
                users.splice(ui, 1);
                localStorage.setItem("users", JSON.stringify(users));
              }
              const posts = JSON.parse(localStorage.getItem("posts") || "[]");
              const updatedPosts = posts
                .filter((p) => p.author !== username)
                .map((p) => {
                  if (Array.isArray(p.likedUsers))
                    p.likedUsers = p.likedUsers.filter((u) => u !== username);
                  if (Array.isArray(p.comments))
                    p.comments = p.comments.filter(
                      (c) => c.author !== username,
                    );
                  p.likes =
                    (p.likedUsers && p.likedUsers.length) || p.likes || 0;
                  return p;
                });
              localStorage.setItem("posts", JSON.stringify(updatedPosts));
              // sign out supabase user if present
              if (window.SocialSupabase && supUser) {
                try {
                  await SocialSupabase.logout();
                } catch (e) {
                  console.warn("Supabase logout failed", e);
                }
              }
              localStorage.removeItem("user");
              alert("Account and associated data removed");
              window.location.href = "login.html";
            } catch (e) {
              console.error(e);
              alert("Could not delete account");
            }
          });
      })();
    </script>
  </body>
</html>
